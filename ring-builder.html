<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring Builder — Lumière Gems</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    #ring-root {
      max-width: 1060px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    #ring-root * { box-sizing: border-box; }
    #ring-root select,
    #ring-root input[type="number"],
    #ring-root input[type="text"] { font-family: 'Inter', sans-serif; }

    @media (min-width: 720px) {
      .rb-layout {
        display: grid;
        grid-template-columns: 290px 1fr;
        gap: 32px;
        align-items: start;
      }
      .rb-sticky { position: sticky; top: 72px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="logo-mark">◆</span>
        <div>
          <div class="logo-name">Lumière Gems</div>
          <div class="logo-sub">Trade Portal</div>
        </div>
      </div>
      <nav style="display:flex;align-items:center;gap:24px;">
        <a href="index.html" style="font-size:14px;color:var(--gray-600);text-decoration:none;font-weight:500;">← Inventory</a>
        <a href="mailto:enquiries@lumieregems.com" class="header-contact">enquiries@lumieregems.com</a>
        <a href="tel:+97253948926" class="header-contact">+972 539 4826</a>
      </nav>
    </div>
  </header>

  <!-- PAGE TITLE -->
  <div class="page-title" style="max-width:1060px;margin:0 auto;padding:0 20px;">
    <div>
      <h1>Ring Builder</h1>
      <p class="page-sub">Configure your ideal ring · Prices on application · Ramat Gan, Israel</p>
    </div>
  </div>

  <!-- REACT MOUNT POINT -->
  <div id="ring-root"></div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span>© 2026 Lumière Gems · Ramat Gan, Israel · All stones subject to prior sale</span>
      <span>For trade enquiries: <a href="mailto:enquiries@lumieregems.com">enquiries@lumieregems.com</a></span>
    </div>
  </footer>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    /** @jsxRuntime classic */
    const { useState } = React;

    /* ── Data ──────────────────────────────────────────────────── */

    const STONE_SHAPES = [
      { id: "round",    label: "Round",    desc: "Most popular" },
      { id: "oval",     label: "Oval",     desc: "Elongating" },
      { id: "cushion",  label: "Cushion",  desc: "Soft & romantic" },
      { id: "princess", label: "Princess", desc: "Bold corners" },
      { id: "pear",     label: "Pear",     desc: "Unique silhouette" },
      { id: "emerald",  label: "Emerald",  desc: "Step-cut" },
      { id: "marquise", label: "Marquise", desc: "Dramatic points" },
    ];

    const STONE_SIZES = ["0.5ct","0.75ct","1ct","1.25ct","1.5ct","2ct","2.5ct","3ct"];
    const COLOR_GRADES   = ["D","E","F","G","H","I","J+"];
    const CLARITY_GRADES = ["FL","IF","VVS1","VVS2","VS1","VS2","SI1","SI2"];

    const RING_HEAD_TYPES = [
      { id: "4prongs",    label: "4 Prongs",      desc: "Classic solitaire" },
      { id: "basket",     label: "Basket",         desc: "Secure hold" },
      { id: "peghead",    label: "Peg Head",       desc: "Minimal look" },
      { id: "pave",       label: "Pavé",           desc: "Extra brilliance" },
      { id: "singlehalo", label: "Single Halo",    desc: "Adds perceived size" },
      { id: "doublehalo", label: "Double Halo",    desc: "Maximum sparkle" },
      { id: "crown",      label: "Crown",          desc: "Regal elevation" },
      { id: "flowerhalo", label: "Flower Halo",    desc: "Floral detail" },
    ];

    const MOUNTING_TYPES = [
      { id: "single",       label: "Single",        desc: "Sleek & timeless" },
      { id: "double",       label: "Double",        desc: "Two-band look" },
      { id: "doubletwist",  label: "Double twist",  desc: "Elegant braid" },
      { id: "knifeedge",    label: "Knife edge",    desc: "Ultra-thin profile" },
      { id: "squareedge",   label: "Square edge",   desc: "Bold & modern" },
      { id: "tapered",      label: "Tapered",       desc: "Wider at head" },
      { id: "contemporary", label: "Contemporary",  desc: "Architectural" },
      { id: "hiddenhalo",   label: "Hidden halo",   desc: "Surprise detail" },
      { id: "split",        label: "Split",         desc: "Forked shank" },
    ];

    const SIDE_SETTING_TYPES = [
      { id: "none",    label: "None",    desc: "Clean band" },
      { id: "channel", label: "Channel", desc: "Flush-set row" },
      { id: "pave",    label: "Pavé",    desc: "Cobblestone look" },
      { id: "prong",   label: "Prong",   desc: "Individual set" },
      { id: "bead",    label: "Bead",    desc: "Milgrain style" },
    ];

    const SIDE_STONE_TYPES = [
      { id: "natural",      label: "Natural diamond",       color: "#e8e8e8" },
      { id: "blackdiamond", label: "Black diamond",         color: "#222" },
      { id: "altblack",     label: "Alternating black",     color: "#555" },
      { id: "altsapphire",  label: "Alternating sapphire",  color: "#3b5bdb" },
      { id: "altemerald",   label: "Alternating emerald",   color: "#2f9e44" },
      { id: "altruby",      label: "Alternating ruby",      color: "#c92a2a" },
    ];

    const CARVING_TYPES = [
      { id: "plain",  label: "Plain",  desc: "No texture" },
      { id: "leaf",   label: "Leaf",   desc: "Nature-inspired" },
      { id: "scroll", label: "Scroll", desc: "Ornate wave" },
    ];

    const PEEKABOO_TYPES = [
      { id: "none",   label: "None",   desc: "No understone" },
      { id: "round",  label: "Round",  desc: "Hidden sparkle" },
      { id: "square", label: "Square", desc: "Geometric detail" },
    ];

    const METAL_COLORS = [
      { id: "yellow", label: "Yellow Gold", color: "#D4A017", desc: "Warm · traditional" },
      { id: "white",  label: "White Gold",  color: "#C0C0C0", desc: "Cool · contemporary" },
      { id: "rose",   label: "Rose Gold",   color: "#E8B4A0", desc: "Romantic · modern" },
    ];

    const FINISH_TYPES = [
      { id: "polished", label: "Polished", desc: "High shine" },
      { id: "brushed",  label: "Brushed",  desc: "Satin texture" },
      { id: "matte",    label: "Matte",    desc: "Flat, no-glare" },
    ];

    const ENGRAVING_STYLES = [
      { id: "block",  label: "Block",  sample: "Aa", style: { fontWeight: 700, fontFamily: "Inter, sans-serif" } },
      { id: "script", label: "Script", sample: "Aa", style: { fontStyle: "italic", fontFamily: "Georgia, serif" } },
      { id: "serif",  label: "Serif",  sample: "Aa", style: { fontFamily: "Georgia, serif" } },
    ];

    /* ── Sub-components ─────────────────────────────────────────── */

    function OptionCard({ selected, onClick, children, disabled }) {
      return (
        <div
          onClick={disabled ? undefined : onClick}
          style={{
            border: selected ? "2px solid #1a56db" : "1.5px solid #e5e7eb",
            borderRadius: 8,
            padding: "10px 8px",
            cursor: disabled ? "not-allowed" : "pointer",
            background: selected ? "#eff6ff" : disabled ? "#fafafa" : "#fff",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            gap: 4,
            opacity: disabled ? 0.4 : 1,
            transition: "all 0.15s",
            minWidth: 72,
            flex: "1 1 72px",
          }}
        >
          {children}
        </div>
      );
    }

    function SectionTitle({ children }) {
      return (
        <h3 style={{ fontSize: 15, fontWeight: 600, color: "#111827", margin: "28px 0 4px", fontFamily: "Inter, sans-serif", letterSpacing: "-0.01em" }}>
          {children}
        </h3>
      );
    }

    function SubLabel({ children }) {
      return (
        <p style={{ fontSize: 11, color: "#6b7280", margin: "12px 0 8px", fontFamily: "Inter, sans-serif", textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600 }}>
          {children}
        </p>
      );
    }

    function PillToggle({ options, value, onChange }) {
      return (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
          {options.map((opt) => (
            <button
              key={opt.id}
              onClick={() => onChange(opt.id)}
              style={{
                padding: "7px 16px",
                borderRadius: 20,
                border: value === opt.id ? "2px solid #1a56db" : "1.5px solid #d1d5db",
                background: value === opt.id ? "#1a56db" : "#fff",
                color: value === opt.id ? "#fff" : "#374151",
                fontWeight: 500,
                fontSize: 13,
                cursor: "pointer",
                transition: "all 0.15s",
                display: "flex",
                alignItems: "center",
                gap: 6,
                fontFamily: "Inter, sans-serif",
              }}
            >
              {opt.dot && (
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: opt.dot, border: "1px solid rgba(0,0,0,0.1)", display: "inline-block" }} />
              )}
              {opt.label}
            </button>
          ))}
        </div>
      );
    }

    function GradeRow({ label, options, value, onChange }) {
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
            <SubLabel>{label}</SubLabel>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#1a56db", fontFamily: "Inter, sans-serif" }}>{value}</span>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {options.map((g) => (
              <button
                key={g}
                onClick={() => onChange(g)}
                style={{
                  flex: 1,
                  padding: "6px 2px",
                  borderRadius: 6,
                  border: value === g ? "2px solid #1a56db" : "1.5px solid #e5e7eb",
                  background: value === g ? "#1a56db" : "#fff",
                  color: value === g ? "#fff" : "#374151",
                  fontWeight: 600,
                  fontSize: 11,
                  cursor: "pointer",
                  fontFamily: "Inter, sans-serif",
                  transition: "all 0.15s",
                  minWidth: 0,
                }}
              >
                {g}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function ShapeIcon({ id, size = 28 }) {
      const s = { fill: "none", stroke: "currentColor", strokeWidth: "2" };
      const shapes = {
        round: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="14" {...s} />
            <circle cx="20" cy="20" r="8" {...s} strokeWidth="1" strokeDasharray="2 2" opacity="0.4"/>
          </svg>
        ),
        oval: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <ellipse cx="20" cy="20" rx="10" ry="15" {...s} />
          </svg>
        ),
        cushion: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <rect x="8" y="8" width="24" height="24" rx="6" {...s} />
          </svg>
        ),
        princess: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <rect x="9" y="9" width="22" height="22" rx="1" {...s} />
            <line x1="9" y1="9" x2="31" y2="31" stroke="currentColor" strokeWidth="1" opacity="0.3"/>
            <line x1="31" y1="9" x2="9" y2="31" stroke="currentColor" strokeWidth="1" opacity="0.3"/>
          </svg>
        ),
        pear: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <path d="M20 8 C10 8 8 18 8 24 C8 32 14 36 20 36 C26 36 32 32 32 24 C32 18 30 8 20 8Z" {...s} />
          </svg>
        ),
        emerald: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <rect x="7" y="12" width="26" height="16" rx="2" {...s} />
            <rect x="11" y="15" width="18" height="10" {...s} strokeWidth="1" opacity="0.4"/>
          </svg>
        ),
        marquise: (
          <svg width={size} height={size} viewBox="0 0 40 40">
            <path d="M20 6 C30 15 32 25 20 34 C8 25 10 15 20 6Z" {...s} />
          </svg>
        ),
      };
      return shapes[id] || null;
    }

    function RingPreview({ config }) {
      const metalColor = config.metalColor === "yellow" ? "#D4A017" : config.metalColor === "rose" ? "#E8946A" : "#C8C8C8";
      const stoneColor = config.stoneType === "lab" ? "#c8d8f8" : "#f0f0f0";
      return (
        <svg width="240" height="190" viewBox="0 0 260 200" style={{ display: "block", margin: "0 auto" }}>
          <ellipse cx="130" cy="170" rx="70" ry="18" fill={metalColor} opacity="0.7" />
          <rect x="70" y="80" width="120" height="90" rx="4" fill={metalColor} />
          <rect x="80" y="75" width="100" height="95" rx="4" fill={metalColor} opacity="0.5" />
          <path d="M70 140 Q50 160 60 175 Q80 185 130 188 Q180 185 200 175 Q210 160 190 140" fill={metalColor} />
          <rect x="112" y="54" width="8" height="30" rx="3" fill={metalColor} />
          <rect x="140" y="54" width="8" height="30" rx="3" fill={metalColor} />
          <rect x="112" y="54" width="8" height="30" rx="3" fill={metalColor} transform="rotate(-20 116 80)" />
          <rect x="140" y="54" width="8" height="30" rx="3" fill={metalColor} transform="rotate(20 144 80)" />
          <ellipse cx="130" cy="68" rx="30" ry="28" fill={stoneColor} opacity="0.95" />
          <ellipse cx="130" cy="68" rx="30" ry="28" fill="none" stroke={metalColor} strokeWidth="2" />
          <line x1="130" y1="42" x2="130" y2="94" stroke="white" strokeWidth="0.5" opacity="0.5" />
          <line x1="102" y1="68" x2="158" y2="68" stroke="white" strokeWidth="0.5" opacity="0.5" />
          <line x1="109" y1="48" x2="151" y2="88" stroke="white" strokeWidth="0.5" opacity="0.3" />
          <line x1="151" y1="48" x2="109" y2="88" stroke="white" strokeWidth="0.5" opacity="0.3" />
          <circle cx="117" cy="55" r="3" fill="white" opacity="0.8" />
          <circle cx="125" cy="50" r="2" fill="white" opacity="0.6" />
          {config.sideSetting !== "none" && (
            <>
              {[84, 93, 102].map((x, i) => (
                <ellipse key={i} cx={x} cy={145} rx="5" ry="4" fill={stoneColor} opacity="0.8" stroke={metalColor} strokeWidth="0.5" />
              ))}
              {[158, 167, 176].map((x, i) => (
                <ellipse key={i} cx={x} cy={145} rx="5" ry="4" fill={stoneColor} opacity="0.8" stroke={metalColor} strokeWidth="0.5" />
              ))}
            </>
          )}
        </svg>
      );
    }

    /* ── Main configurator ──────────────────────────────────────── */

    function RingConfigurator() {
      const [config, setConfig] = useState({
        stoneShape:     "round",
        stoneType:      "lab",
        stoneSize:      "1ct",
        stoneColor:     "F",
        stoneClarity:   "VS1",
        ringHead:       "4prongs",
        mounting:       "single",
        sideSetting:    "none",
        sideStoneType:  "natural",
        mountingLength: "Half",
        peekaboo:       "none",
        carving:        "plain",
        metalType:      "gold",
        metalQuality:   "18KT",
        metalColor:     "yellow",
        mountingColor:  "yellow",
        finish:         "polished",
        ringSizeSystem: "US",
        ringSize:       "6",
        engravingStyle: "block",
        engravingText:  "",
      });

      const [showEngraving, setShowEngraving] = useState(false);

      const set = (key) => (val) => setConfig((c) => ({ ...c, [key]: val }));

      const activeMetal = METAL_COLORS.find(m => m.id === config.metalColor);
      const activeEngravingStyle = ENGRAVING_STYLES.find(s => s.id === config.engravingStyle);

      const cardStyle = {
        background: "#fff",
        border: "1px solid #e5e7eb",
        borderRadius: 10,
        padding: "20px 22px",
        marginBottom: 16,
      };

      const enquire = () => {
        const body = [
          "Shape: " + config.stoneShape,
          "Type: " + (config.stoneType === "lab" ? "Lab grown" : "Natural"),
          "Size: " + config.stoneSize,
          "Colour: " + config.stoneColor,
          "Clarity: " + config.stoneClarity,
          "Setting: " + config.ringHead,
          "Band: " + config.mounting,
          "Metal: " + (config.metalType === "platinum" ? "Platinum" : config.metalQuality + " " + config.metalColor + " gold"),
          "Finish: " + config.finish,
          "Ring size: " + config.ringSize + " (" + config.ringSizeSystem + ")",
          config.engravingText ? "Engraving: " + config.engravingText : null,
        ].filter(Boolean).join("%0A");
        window.location.href = "mailto:enquiries@lumieregems.com?subject=Ring Builder Enquiry&body=" + body;
      };

      return (
        <div style={{ fontFamily: "Inter, sans-serif" }}>
          <div className="rb-layout">

            {/* ── LEFT: Preview + summary ── */}
            <div className="rb-sticky">
              <div style={{ ...cardStyle, textAlign: "center", padding: "24px 16px 16px" }}>
                <RingPreview config={config} />
                {/* Config tags */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "center", marginTop: 10 }}>
                  {[
                    config.stoneShape,
                    config.stoneSize,
                    config.stoneColor + " · " + config.stoneClarity,
                    config.metalType === "platinum" ? "Platinum" : config.metalQuality + " " + (config.metalColor === "yellow" ? "Yellow" : config.metalColor === "white" ? "White" : "Rose"),
                  ].map((tag, i) => (
                    <span key={i} style={{ background: "#f3f4f6", border: "1px solid #e5e7eb", borderRadius: 4, padding: "2px 8px", fontSize: 11, color: "#374151", fontWeight: 500, textTransform: "capitalize" }}>
                      {tag}
                    </span>
                  ))}
                </div>
              </div>

              <div style={cardStyle}>
                <p style={{ fontSize: 11, color: "#6b7280", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 500 }}>Estimated price</p>
                <p style={{ fontSize: 26, fontWeight: 700, color: "#111827", margin: 0 }}>POA</p>
                <p style={{ fontSize: 12, color: "#9ca3af", margin: "4px 0 0" }}>Price on application · varies with stone</p>
              </div>

              {/* Summary */}
              <div style={cardStyle}>
                <p style={{ fontSize: 11, fontWeight: 600, color: "#374151", margin: "0 0 10px", textTransform: "uppercase", letterSpacing: "0.05em" }}>Summary</p>
                {[
                  ["Shape",   config.stoneShape],
                  ["Type",    config.stoneType === "lab" ? "Lab grown" : "Natural"],
                  ["Size",    config.stoneSize],
                  ["Colour",  config.stoneColor],
                  ["Clarity", config.stoneClarity],
                  ["Setting", RING_HEAD_TYPES.find(h => h.id === config.ringHead)?.label],
                  ["Band",    MOUNTING_TYPES.find(m => m.id === config.mounting)?.label],
                  ["Metal",   config.metalType === "platinum" ? "Platinum" : config.metalQuality + " " + activeMetal?.label],
                  ["Finish",  config.finish.charAt(0).toUpperCase() + config.finish.slice(1)],
                  ["Size",    config.ringSize + " (" + config.ringSizeSystem + ")"],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderTop: "1px solid #f3f4f6", fontSize: 13 }}>
                    <span style={{ color: "#6b7280" }}>{k}</span>
                    <span style={{ fontWeight: 500, color: "#111827", textTransform: "capitalize" }}>{v}</span>
                  </div>
                ))}
              </div>

              <button
                onClick={enquire}
                style={{ width: "100%", padding: "13px", borderRadius: 8, border: "none", background: "#111827", color: "#fff", fontWeight: 600, fontSize: 14, cursor: "pointer", marginBottom: 10, fontFamily: "Inter, sans-serif" }}
              >
                Enquire about this ring
              </button>
              <button
                onClick={() => { window.location.href = "index.html"; }}
                style={{ width: "100%", padding: "13px", borderRadius: 8, border: "1.5px solid #1a56db", background: "#fff", color: "#1a56db", fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}
              >
                Browse center stones →
              </button>
            </div>

            {/* ── RIGHT: Config panels ── */}
            <div>

              {/* CENTER STONE */}
              <div style={cardStyle}>
                <SectionTitle>Center stone</SectionTitle>

                <SubLabel>Shape</SubLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 4 }}>
                  {STONE_SHAPES.map((s) => (
                    <OptionCard key={s.id} selected={config.stoneShape === s.id} onClick={() => set("stoneShape")(s.id)}>
                      <span style={{ color: config.stoneShape === s.id ? "#1a56db" : "#374151" }}>
                        <ShapeIcon id={s.id} size={26} />
                      </span>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.stoneShape === s.id ? "#1a56db" : "#374151" }}>{s.label}</span>
                      <span style={{ fontSize: 9, color: config.stoneShape === s.id ? "#93c5fd" : "#9ca3af" }}>{s.desc}</span>
                    </OptionCard>
                  ))}
                </div>

                <SubLabel>Type</SubLabel>
                <PillToggle
                  options={[{ id: "lab", label: "Lab grown" }, { id: "natural", label: "Natural" }]}
                  value={config.stoneType}
                  onChange={set("stoneType")}
                />

                <SubLabel>Size</SubLabel>
                <select
                  value={config.stoneSize}
                  onChange={(e) => set("stoneSize")(e.target.value)}
                  style={{ padding: "8px 12px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 14, marginBottom: 4, width: 150, fontFamily: "Inter, sans-serif" }}
                >
                  {STONE_SIZES.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>

                <GradeRow label="Colour" options={COLOR_GRADES}   value={config.stoneColor}   onChange={set("stoneColor")} />
                <GradeRow label="Clarity" options={CLARITY_GRADES} value={config.stoneClarity} onChange={set("stoneClarity")} />
              </div>

              {/* RING SETTING */}
              <div style={cardStyle}>
                <SectionTitle>Setting</SectionTitle>
                <p style={{ fontSize: 12, color: "#6b7280", margin: "4px 0 12px", fontFamily: "Inter, sans-serif" }}>How the stone sits on the ring</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {RING_HEAD_TYPES.map((h) => (
                    <OptionCard key={h.id} selected={config.ringHead === h.id} onClick={() => set("ringHead")(h.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        <circle cx="16" cy="14" r="8" fill="none" stroke={config.ringHead === h.id ? "#1a56db" : "#9ca3af"} strokeWidth="1.5" />
                        <rect x="12" y="20" width="8" height="8" rx="2" fill={config.ringHead === h.id ? "#1a56db" : "#d1d5db"} opacity="0.4" />
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.ringHead === h.id ? "#1a56db" : "#374151", textAlign: "center" }}>{h.label}</span>
                      <span style={{ fontSize: 9, color: config.ringHead === h.id ? "#93c5fd" : "#9ca3af", textAlign: "center" }}>{h.desc}</span>
                    </OptionCard>
                  ))}
                </div>
              </div>

              {/* BAND */}
              <div style={cardStyle}>
                <SectionTitle>Band</SectionTitle>

                <SubLabel>Style</SubLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
                  {MOUNTING_TYPES.map((m) => (
                    <OptionCard key={m.id} selected={config.mounting === m.id} onClick={() => set("mounting")(m.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        <path d="M6 22 C10 12 22 12 26 22" fill="none" stroke={config.mounting === m.id ? "#1a56db" : "#9ca3af"} strokeWidth="2" strokeLinecap="round" />
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.mounting === m.id ? "#1a56db" : "#374151", textAlign: "center" }}>{m.label}</span>
                      <span style={{ fontSize: 9, color: config.mounting === m.id ? "#93c5fd" : "#9ca3af", textAlign: "center" }}>{m.desc}</span>
                    </OptionCard>
                  ))}
                </div>

                <SubLabel>Side stones</SubLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                  {SIDE_SETTING_TYPES.map((s) => (
                    <OptionCard key={s.id} selected={config.sideSetting === s.id} onClick={() => set("sideSetting")(s.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        {s.id === "none" ? (
                          <line x1="8" y1="8" x2="24" y2="24" stroke="#d1d5db" strokeWidth="2" />
                        ) : (
                          [8, 14, 20].map((x) => (
                            <circle key={x} cx={x} cy="16" r="3" fill={config.sideSetting === s.id ? "#1a56db" : "#d1d5db"} opacity="0.8" />
                          ))
                        )}
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.sideSetting === s.id ? "#1a56db" : "#374151" }}>{s.label}</span>
                      <span style={{ fontSize: 9, color: config.sideSetting === s.id ? "#93c5fd" : "#9ca3af" }}>{s.desc}</span>
                    </OptionCard>
                  ))}
                </div>

                {config.sideSetting !== "none" && (
                  <>
                    <SubLabel>Side stone type</SubLabel>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                      {SIDE_STONE_TYPES.map((s) => (
                        <OptionCard key={s.id} selected={config.sideStoneType === s.id} onClick={() => set("sideStoneType")(s.id)}>
                          <div style={{ width: 20, height: 20, borderRadius: "50%", background: s.color, border: "1.5px solid #e5e7eb" }} />
                          <span style={{ fontSize: 9, color: config.sideStoneType === s.id ? "#1a56db" : "#6b7280", textAlign: "center", fontWeight: 600 }}>{s.label}</span>
                        </OptionCard>
                      ))}
                    </div>

                    <SubLabel>Coverage</SubLabel>
                    <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                      {["Half", "Three quarters"].map((l) => (
                        <OptionCard key={l} selected={config.mountingLength === l} onClick={() => set("mountingLength")(l)}>
                          <svg width="28" height="28" viewBox="0 0 32 32">
                            <circle cx="16" cy="16" r="12" fill="none" stroke={config.mountingLength === l ? "#1a56db" : "#d1d5db"} strokeWidth="2" strokeDasharray={l === "Half" ? "18 18" : "27 9"} />
                          </svg>
                          <span style={{ fontSize: 10, fontWeight: 600, color: config.mountingLength === l ? "#1a56db" : "#374151" }}>{l}</span>
                        </OptionCard>
                      ))}
                    </div>
                  </>
                )}

                <SubLabel>Carving</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {CARVING_TYPES.map((c) => (
                    <OptionCard key={c.id} selected={config.carving === c.id} onClick={() => set("carving")(c.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        <path
                          d={c.id === "plain" ? "M6 16 L26 16" : c.id === "leaf" ? "M6 16 C10 10 15 10 16 16 C17 22 22 22 26 16" : "M6 16 C8 12 10 20 12 16 C14 12 16 20 18 16 C20 12 22 20 24 16 C25 14 26 15 26 16"}
                          fill="none" stroke={config.carving === c.id ? "#1a56db" : "#9ca3af"} strokeWidth="2" strokeLinecap="round"
                        />
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.carving === c.id ? "#1a56db" : "#374151" }}>{c.label}</span>
                      <span style={{ fontSize: 9, color: config.carving === c.id ? "#93c5fd" : "#9ca3af" }}>{c.desc}</span>
                    </OptionCard>
                  ))}
                </div>

                <SubLabel>Peekaboo stone</SubLabel>
                <div style={{ display: "flex", gap: 8 }}>
                  {PEEKABOO_TYPES.map((p) => (
                    <OptionCard key={p.id} selected={config.peekaboo === p.id} onClick={() => set("peekaboo")(p.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        {p.id === "none" ? (
                          <line x1="8" y1="8" x2="24" y2="24" stroke="#d1d5db" strokeWidth="2" />
                        ) : p.id === "round" ? (
                          <circle cx="16" cy="16" r="9" fill="none" stroke={config.peekaboo === p.id ? "#1a56db" : "#9ca3af"} strokeWidth="1.5" />
                        ) : (
                          <rect x="8" y="8" width="16" height="16" rx="2" fill="none" stroke={config.peekaboo === p.id ? "#1a56db" : "#9ca3af"} strokeWidth="1.5" />
                        )}
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.peekaboo === p.id ? "#1a56db" : "#374151" }}>{p.label}</span>
                      <span style={{ fontSize: 9, color: config.peekaboo === p.id ? "#93c5fd" : "#9ca3af" }}>{p.desc}</span>
                    </OptionCard>
                  ))}
                </div>
              </div>

              {/* MATERIALS */}
              <div style={cardStyle}>
                <SectionTitle>Materials</SectionTitle>

                <SubLabel>Metal type</SubLabel>
                <PillToggle
                  options={[{ id: "gold", label: "Gold", dot: "#D4A017" }, { id: "platinum", label: "Platinum", dot: "#C0C0C0" }]}
                  value={config.metalType}
                  onChange={set("metalType")}
                />

                {config.metalType === "gold" && (
                  <>
                    <SubLabel>Karat</SubLabel>
                    <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                      {["9KT","14KT","18KT"].map((q) => (
                        <button key={q} onClick={() => set("metalQuality")(q)}
                          style={{ padding: "7px 18px", borderRadius: 6, border: config.metalQuality === q ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: config.metalQuality === q ? "#eff6ff" : "#fff", color: config.metalQuality === q ? "#1a56db" : "#374151", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                          {q}
                        </button>
                      ))}
                    </div>
                  </>
                )}

                <SubLabel>Head colour</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                  {METAL_COLORS.map((mc) => (
                    <button key={mc.id} onClick={() => set("metalColor")(mc.id)}
                      style={{ padding: "8px 14px", borderRadius: 20, border: config.metalColor === mc.id ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: config.metalColor === mc.id ? "#eff6ff" : "#fff", color: config.metalColor === mc.id ? "#1a56db" : "#374151", fontWeight: 500, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "Inter, sans-serif" }}>
                      <span style={{ width: 12, height: 12, borderRadius: "50%", background: mc.color, border: "1px solid rgba(0,0,0,0.1)", display: "inline-block" }} />
                      {mc.label}
                    </button>
                  ))}
                </div>
                {activeMetal && (
                  <p style={{ fontSize: 12, color: "#6b7280", margin: "0 0 14px", fontFamily: "Inter, sans-serif" }}>
                    {activeMetal.label} · {activeMetal.desc}
                  </p>
                )}

                <SubLabel>Band colour</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {METAL_COLORS.map((mc) => (
                    <button key={mc.id} onClick={() => set("mountingColor")(mc.id)}
                      style={{ padding: "8px 14px", borderRadius: 20, border: (config.mountingColor || "yellow") === mc.id ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: (config.mountingColor || "yellow") === mc.id ? "#eff6ff" : "#fff", color: (config.mountingColor || "yellow") === mc.id ? "#1a56db" : "#374151", fontWeight: 500, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "Inter, sans-serif" }}>
                      <span style={{ width: 12, height: 12, borderRadius: "50%", background: mc.color, border: "1px solid rgba(0,0,0,0.1)", display: "inline-block" }} />
                      {mc.label}
                    </button>
                  ))}
                </div>

                <SubLabel>Finish</SubLabel>
                <div style={{ display: "flex", gap: 8 }}>
                  {FINISH_TYPES.map((f) => (
                    <OptionCard key={f.id} selected={config.finish === f.id} onClick={() => set("finish")(f.id)}>
                      <svg width="28" height="28" viewBox="0 0 32 32">
                        {f.id === "polished" && (
                          <circle cx="16" cy="16" r="10" fill="none" stroke={config.finish === f.id ? "#1a56db" : "#9ca3af"} strokeWidth="1.5" />
                        )}
                        {f.id === "brushed" && (
                          <>
                            {[10,13,16,19,22].map(y => (
                              <line key={y} x1="7" y1={y} x2="25" y2={y} stroke={config.finish === f.id ? "#1a56db" : "#9ca3af"} strokeWidth="1" />
                            ))}
                          </>
                        )}
                        {f.id === "matte" && (
                          <rect x="7" y="7" width="18" height="18" rx="2" fill={config.finish === f.id ? "#1a56db" : "#d1d5db"} opacity="0.3" stroke={config.finish === f.id ? "#1a56db" : "#9ca3af"} strokeWidth="1.5" />
                        )}
                      </svg>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.finish === f.id ? "#1a56db" : "#374151" }}>{f.label}</span>
                      <span style={{ fontSize: 9, color: config.finish === f.id ? "#93c5fd" : "#9ca3af" }}>{f.desc}</span>
                    </OptionCard>
                  ))}
                </div>
              </div>

              {/* SIZING & ENGRAVING */}
              <div style={cardStyle}>
                <SectionTitle>Sizing &amp; engraving</SectionTitle>

                <SubLabel>Ring size</SubLabel>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                  <PillToggle
                    options={[{ id: "UK", label: "UK" }, { id: "US", label: "US" }]}
                    value={config.ringSizeSystem}
                    onChange={set("ringSizeSystem")}
                  />
                  <input type="number" min="1" max="13" step="0.5" value={config.ringSize}
                    onChange={(e) => set("ringSize")(e.target.value)}
                    style={{ width: 70, padding: "7px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 14, textAlign: "center", fontFamily: "Inter, sans-serif" }} />
                </div>

                <SubLabel>Engraving font</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {ENGRAVING_STYLES.map((s) => (
                    <OptionCard key={s.id} selected={config.engravingStyle === s.id} onClick={() => set("engravingStyle")(s.id)}>
                      <span style={{ fontSize: 18, color: config.engravingStyle === s.id ? "#1a56db" : "#374151", lineHeight: 1, ...s.style }}>{s.sample}</span>
                      <span style={{ fontSize: 10, fontWeight: 600, color: config.engravingStyle === s.id ? "#1a56db" : "#374151" }}>{s.label}</span>
                    </OptionCard>
                  ))}
                </div>

                <SubLabel>Inscription</SubLabel>
                <div style={{ border: "1.5px solid #d1d5db", borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  {showEngraving ? (
                    <input autoFocus value={config.engravingText} onChange={(e) => set("engravingText")(e.target.value)}
                      placeholder="e.g. 09 · 06 · 2026" maxLength={30}
                      style={{ border: "none", outline: "none", fontSize: 14, flex: 1, background: "transparent", fontFamily: "Inter, sans-serif", ...(activeEngravingStyle?.style || {}) }} />
                  ) : (
                    <span style={{ color: "#9ca3af", fontSize: 14 }}>{config.engravingText || "No engraving added"}</span>
                  )}
                  <button onClick={() => setShowEngraving(!showEngraving)}
                    style={{ background: "none", border: "none", color: "#1a56db", fontWeight: 600, cursor: "pointer", fontSize: 13, fontFamily: "Inter, sans-serif" }}>
                    {showEngraving ? "Done" : "Add +"}
                  </button>
                </div>
                {config.engravingText && (
                  <div style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 8, padding: "12px", textAlign: "center" }}>
                    <p style={{ fontSize: 10, color: "#9ca3af", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.06em" }}>Preview · Inner band</p>
                    <p style={{ fontSize: 14, color: "#374151", margin: 0, ...(activeEngravingStyle?.style || {}) }}>{config.engravingText}</p>
                  </div>
                )}
              </div>

              {/* HALLMARKING */}
              <div style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 10 }}>
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="8" fill="#057a55" />
                  <path d="M4.5 8L7 10.5L11.5 5.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
                <div>
                  <p style={{ fontWeight: 600, fontSize: 14, margin: 0, color: "#111827" }}>Hallmarking included</p>
                  <p style={{ fontSize: 12, color: "#6b7280", margin: 0 }}>For EU &amp; UK orders</p>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('ring-root')).render(<RingConfigurator />);
  </script>

</body>
</html>
