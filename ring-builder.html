    /* ── Icon components ──────────────────────────────────────── */

    function GemShapeIcon({ id, sel, size = 44 }) {
      const c  = sel ? "#1a56db" : "#6b7280";
      const f  = sel ? "#dbeafe" : "#f0f4ff";
      const fi = sel ? "#bfdbfe" : "#e5e7eb";
      const ln = sel ? "#93c5fd" : "#d1d5db";
      const sp = "rgba(255,255,255,0.9)";

      if (id === "round") {
        const lines = Array.from({length: 8}, function(_, i) {
          const a = i * 45 * Math.PI / 180;
          return { x1: 24 + 19*Math.cos(a), y1: 24 + 19*Math.sin(a), x2: 24 + 9*Math.cos(a), y2: 24 + 9*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="19" fill={f} stroke={c} strokeWidth="1.5"/>
            {lines.map(function(l, i) { return <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={ln} strokeWidth="0.8"/>; })}
            <circle cx="24" cy="24" r="9" fill={fi} stroke={c} strokeWidth="1"/>
            <circle cx="17" cy="17" r="2.5" fill={sp}/>
            <circle cx="21" cy="14" r="1.5" fill={sp} opacity="0.7"/>
          </svg>
        );
      }
      if (id === "oval") {
        const lines = Array.from({length: 8}, function(_, i) {
          const a = i * 45 * Math.PI / 180;
          const ox = 13 * Math.cos(a), oy = 19 * Math.sin(a);
          const len = Math.sqrt(ox*ox + oy*oy), sc = 7 / len;
          return { x1: 24+ox, y1: 24+oy, x2: 24+ox*sc, y2: 24+oy*sc };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            <ellipse cx="24" cy="24" rx="13" ry="19" fill={f} stroke={c} strokeWidth="1.5"/>
            {lines.map(function(l, i) { return <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={ln} strokeWidth="0.8"/>; })}
            <ellipse cx="24" cy="24" rx="6" ry="9" fill={fi} stroke={c} strokeWidth="1"/>
            <ellipse cx="19" cy="18" rx="2" ry="2.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "cushion") return (
        <svg width={size} height={size} viewBox="0 0 48 48">

        <svg width={size} height={size} viewBox="0 0 48 48">

          <line x1="7" y1="24" x2="41" y2="24" stroke={ln} strokeWidth="0.8"/>
          <path d="M24 12 C30 17 33 21 33 24 C33 27 30 31 24 36 C18 31 15 27 15 24 C15 21 18 17 24 12Z" fill={fi} stroke={c} strokeWidth="0.8"/>

      return null;

    function SettingIcon({ id, sel, size = 44 }) {
      const c  = sel ? "#1a56db" : "#6b7280";
      const sf = sel ? "#dbeafe" : "#f0f4ff";
      const mf = sel ? "#bfdbfe" : "#e5e7eb";

        <svg width={size} height={size} viewBox="0 0 48 48">

      if (id === "peghead") return (
        <svg width={size} height={size} viewBox="0 0 48 48">

          <ellipse cx="19" cy="18" rx="2.5" ry="2" fill={sp}/>
        </svg>
      );
      if (id === "pave") {
        const dots = Array.from({length: 12}, function(_, i) {
          const a = i * 30 * Math.PI / 180;
          return { cx: 24 + 15*Math.cos(a), cy: 24 + 15*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {dots.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="3" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="9" ry="7" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "singlehalo") {
        const n = 14;
        const dots = Array.from({length: n}, function(_, i) {
          const a = i * (360/n) * Math.PI / 180;
          return { cx: 24 + 18*Math.cos(a), cy: 24 + 18*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {dots.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2.5" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="10" ry="8" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "doublehalo") {
        const outer = Array.from({length: 18}, function(_, i) {
          const a = i * 20 * Math.PI / 180;
          return { cx: 24 + 21*Math.cos(a), cy: 24 + 21*Math.sin(a) };
        });
        const inner = Array.from({length: 12}, function(_, i) {
          const a = i * 30 * Math.PI / 180;
          return { cx: 24 + 15*Math.cos(a), cy: 24 + 15*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {outer.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2" fill={mc} stroke={c} strokeWidth="0.8"/>; })}
            {inner.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2.5" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="8" ry="6" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="1.8" ry="1.4" fill={sp}/>
          </svg>

      }
      if (id === "crown") {
        const prongs = Array.from({length: 6}, function(_, i) {
          const a = i * 60 * Math.PI / 180;
          return { cx: 24 + 17*Math.cos(a), cy: 24 + 17*Math.sin(a), rot: i*60 };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {prongs.map(function(p, i) {
              return <ellipse key={i} cx={p.cx} cy={p.cy} rx="3.5" ry="5" transform={"rotate(" + p.rot + "," + p.cx + "," + p.cy + ")"} fill={mf} stroke={c} strokeWidth="1.2"/>;
            })}
            <ellipse cx="24" cy="24" rx="10" ry="8" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>

          const a = i * 45 * Math.PI / 180;
          return { cx: 24 + 16*Math.cos(a), cy: 24 + 16*Math.sin(a), rot: i*45 };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {petals.map(function(p, i) {
              return <ellipse key={i} cx={p.cx} cy={p.cy} rx="5.5" ry="3" transform={"rotate(" + p.rot + "," + p.cx + "," + p.cy + ")"} fill={mf} stroke={c} strokeWidth="1"/>;

            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );

      return null;

                </div>
                <SubLabel>Type</SubLabel>
                <PillToggle options={[{id:"lab",label:"Lab grown"},{id:"natural",label:"Natural"}]} value={config.stoneType} onChange={set("stoneType")}/>
                <SubLabel>Size</SubLabel>
                <select value={config.stoneSize} onChange={function(e) { set("stoneSize")(e.target.value); }} style={{ padding: "8px 12px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 14, marginBottom: 4, width: 150 }}>
                  {STONE_SIZES.map(function(s) { return <option key={s} value={s}>{s}</option>; })}
                </select>
                <GradeRow label="Colour"  options={COLOR_GRADES}   value={config.stoneColor}   onChange={set("stoneColor")}/>
                <GradeRow label="Clarity" options={CLARITY_GRADES} value={config.stoneClarity} onChange={set("stoneClarity")}/>
              </div>

              {/* SETTING */}
              <div style={cardStyle}>
                <SectionTitle>Setting</SectionTitle>
                <p style={{ fontSize: 12, color: "#6b7280", margin: "4px 0 12px", fontFamily: "Inter, sans-serif" }}>How the stone sits on the ring</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {RING_HEAD_TYPES.map(function(h) {
                    const sel = config.ringHead === h.id;
                    return (
                      <OptionCard key={h.id} selected={sel} onClick={function() { set("ringHead")(h.id); }}>
                        <SettingIcon id={h.id} sel={sel}/>
                        {cardLabel(h.label, h.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>
              </div>

              {/* BAND */}
              <div style={cardStyle}>
                <SectionTitle>Band</SectionTitle>
                <SubLabel>Style</SubLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
                  {MOUNTING_TYPES.map(function(m) {
                    const sel = config.mounting === m.id;
                    return (
                      <OptionCard key={m.id} selected={sel} onClick={function() { set("mounting")(m.id); }}>
                        <BandStyleIcon id={m.id} sel={sel}/>
                        {cardLabel(m.label, m.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>

                <SubLabel>Side stones</SubLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                  {SIDE_SETTING_TYPES.map(function(s) {
                    const sel = config.sideSetting === s.id;
                    return (
                      <OptionCard key={s.id} selected={sel} onClick={function() { set("sideSetting")(s.id); }}>
                        <SideSettingIcon id={s.id} sel={sel}/>
                        {cardLabel(s.label, s.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>

                {config.sideSetting !== "none" && (
                  <>
                    <SubLabel>Stone type</SubLabel>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                      {SIDE_STONE_TYPES.map(function(s) {
                        const sel = config.sideStoneType === s.id;
                        return (
                          <OptionCard key={s.id} selected={sel} onClick={function() { set("sideStoneType")(s.id); }}>
                            <div style={{ width: 28, height: 28, borderRadius: "50%", background: s.color, border: sel ? "2px solid #1a56db" : "1.5px solid #e5e7eb", boxShadow: "inset 0 2px 4px rgba(255,255,255,0.3)" }}/>
                            <span style={{ fontSize: 9, color: sel ? "#1a56db" : "#6b7280", textAlign: "center", fontWeight: 600 }}>{s.label}</span>
                          </OptionCard>
                        );
                      })}
                    </div>
                    <SubLabel>Coverage</SubLabel>
                    <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                      {["Half","Three quarters"].map(function(l) {
                        const sel = config.mountingLength === l;
                        return (
                          <OptionCard key={l} selected={sel} onClick={function() { set("mountingLength")(l); }}>
                            <svg width="44" height="44" viewBox="0 0 48 48">
                              <circle cx="24" cy="24" r="18" fill="none" stroke={sel ? "#bfdbfe" : "#e5e7eb"} strokeWidth="6"/>
                              <circle cx="24" cy="24" r="18" fill="none" stroke={sel ? "#1a56db" : "#9ca3af"} strokeWidth="6" strokeDasharray={l === "Half" ? "56 57" : "85 28"} strokeLinecap="round"/>
                            </svg>
                            <span style={{ fontSize: 10, fontWeight: 600, color: sel ? "#1a56db" : "#374151" }}>{l}</span>
                          </OptionCard>
                        );
                      })}
                    </div>
                  </>
                )}

                <SubLabel>Carving</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {CARVING_TYPES.map(function(c) {
                    const sel = config.carving === c.id;
                    return (
                      <OptionCard key={c.id} selected={sel} onClick={function() { set("carving")(c.id); }}>
                        <CarvingIcon id={c.id} sel={sel}/>
                        {cardLabel(c.label, c.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>

                <SubLabel>Peekaboo stone</SubLabel>
                <div style={{ display: "flex", gap: 8 }}>
                  {PEEKABOO_TYPES.map(function(p) {
                    const sel = config.peekaboo === p.id;
                    return (
                      <OptionCard key={p.id} selected={sel} onClick={function() { set("peekaboo")(p.id); }}>
                        <PeekabooIcon id={p.id} sel={sel}/>
                        {cardLabel(p.label, p.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>
              </div>

              {/* MATERIALS */}
              <div style={cardStyle}>
                <SectionTitle>Materials</SectionTitle>
                <SubLabel>Metal type</SubLabel>
                <PillToggle options={[{id:"gold",label:"Gold",dot:"#D4A017"},{id:"platinum",label:"Platinum",dot:"#C0C0C0"}]} value={config.metalType} onChange={set("metalType")}/>
                {config.metalType === "gold" && (
                  <>
                    <SubLabel>Karat</SubLabel>
                    <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                      {["9KT","14KT","18KT"].map(function(q) {
                        const a = config.metalQuality === q;
                        return <button key={q} onClick={function() { set("metalQuality")(q); }} style={{ padding: "7px 18px", borderRadius: 6, border: a ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: a ? "#eff6ff" : "#fff", color: a ? "#1a56db" : "#374151", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>{q}</button>;
                      })}
                    </div>
                  </>
                )}
                <SubLabel>Head colour</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                  {METAL_COLORS.map(function(mc) {
                    const a = config.metalColor === mc.id;
                    return (
                      <button key={mc.id} onClick={function() { set("metalColor")(mc.id); }} style={{ padding: "8px 14px", borderRadius: 20, border: a ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: a ? "#eff6ff" : "#fff", color: a ? "#1a56db" : "#374151", fontWeight: 500, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "Inter, sans-serif" }}>
                        <span style={{ width: 12, height: 12, borderRadius: "50%", background: mc.color, border: "1px solid rgba(0,0,0,0.1)", display: "inline-block" }}/>
                        {mc.label}
                      </button>
                    );
                  })}
                </div>
                {activeMetal && <p style={{ fontSize: 12, color: "#6b7280", margin: "0 0 14px", fontFamily: "Inter, sans-serif" }}>{activeMetal.label} · {activeMetal.desc}</p>}
                <SubLabel>Band colour</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {METAL_COLORS.map(function(mc) {
                    const a = (config.mountingColor || "yellow") === mc.id;
                    return (
                      <button key={mc.id} onClick={function() { set("mountingColor")(mc.id); }} style={{ padding: "8px 14px", borderRadius: 20, border: a ? "2px solid #1a56db" : "1.5px solid #d1d5db", background: a ? "#eff6ff" : "#fff", color: a ? "#1a56db" : "#374151", fontWeight: 500, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "Inter, sans-serif" }}>
                        <span style={{ width: 12, height: 12, borderRadius: "50%", background: mc.color, border: "1px solid rgba(0,0,0,0.1)", display: "inline-block" }}/>
                        {mc.label}
                      </button>
                    );
                  })}
                </div>
                <SubLabel>Finish</SubLabel>
                <div style={{ display: "flex", gap: 8 }}>
                  {FINISH_TYPES.map(function(f) {
                    const sel = config.finish === f.id;
                    return (
                      <OptionCard key={f.id} selected={sel} onClick={function() { set("finish")(f.id); }}>
                        <FinishIcon id={f.id} sel={sel}/>
                        {cardLabel(f.label, f.desc, sel)}
                      </OptionCard>
                    );
                  })}
                </div>
              </div>

              {/* SIZING & ENGRAVING */}
              <div style={cardStyle}>
                <SectionTitle>Sizing &amp; engraving</SectionTitle>
                <SubLabel>Ring size</SubLabel>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                  <PillToggle options={[{id:"UK",label:"UK"},{id:"US",label:"US"}]} value={config.ringSizeSystem} onChange={set("ringSizeSystem")}/>
                  <input type="number" min="1" max="13" step="0.5" value={config.ringSize} onChange={function(e) { set("ringSize")(e.target.value); }} style={{ width: 70, padding: "7px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 14, textAlign: "center" }}/>
                </div>
                <SubLabel>Engraving font</SubLabel>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {ENGRAVING_STYLES.map(function(s) {
                    const sel = config.engravingStyle === s.id;
                    return (
                      <OptionCard key={s.id} selected={sel} onClick={function() { set("engravingStyle")(s.id); }}>
                        <span style={{ fontSize: 20, color: sel ? "#1a56db" : "#374151", lineHeight: 1, ...s.style }}>{s.sample}</span>
                        <span style={{ fontSize: 10, fontWeight: 600, color: sel ? "#1a56db" : "#374151" }}>{s.label}</span>
                      </OptionCard>
                    );
                  })}
                </div>
                <SubLabel>Inscription</SubLabel>
                <div style={{ border: "1.5px solid #d1d5db", borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  {showEngraving ? (
                    <input autoFocus value={config.engravingText} onChange={function(e) { set("engravingText")(e.target.value); }} placeholder="e.g. 09 · 06 · 2026" maxLength={30} style={{ border: "none", outline: "none", fontSize: 14, flex: 1, background: "transparent", fontFamily: "Inter, sans-serif", ...(activeEngStyle ? activeEngStyle.style : {}) }}/>
                  ) : (
                    <span style={{ color: "#9ca3af", fontSize: 14 }}>{config.engravingText || "No engraving added"}</span>
                  )}
                  <button onClick={function() { setShowEngraving(!showEngraving); }} style={{ background: "none", border: "none", color: "#1a56db", fontWeight: 600, cursor: "pointer", fontSize: 13, fontFamily: "Inter, sans-serif" }}>
                    {showEngraving ? "Done" : "Add +"}
                  </button>
                </div>
                {config.engravingText && (
                  <div style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 8, padding: "12px", textAlign: "center" }}>
                    <p style={{ fontSize: 10, color: "#9ca3af", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.06em" }}>Preview · Inner band</p>
                    <p style={{ fontSize: 14, color: "#374151", margin: 0, ...(activeEngStyle ? activeEngStyle.style : {}) }}>{config.engravingText}</p>
                  </div>
                )}
              </div>

              {/* HALLMARKING */}
              <div style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 10 }}>
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="8" fill="#057a55"/>
                  <path d="M4.5 8L7 10.5L11.5 5.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <div>
                  <p style={{ fontWeight: 600, fontSize: 14, margin: 0, color: "#111827" }}>Hallmarking included</p>
                  <p style={{ fontSize: 12, color: "#6b7280", margin: 0 }}>For EU &amp; UK orders</p>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('ring-root')).render(<RingConfigurator/>);
  </script>
</body>
</html>
