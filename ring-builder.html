    /* ── Icon components ──────────────────────────────────────── */

    function GemShapeIcon({ id, sel, size = 44 }) {
      const c  = sel ? "#1a56db" : "#6b7280";
      const f  = sel ? "#dbeafe" : "#f0f4ff";
      const fi = sel ? "#bfdbfe" : "#e5e7eb";
      const ln = sel ? "#93c5fd" : "#d1d5db";
      const sp = "rgba(255,255,255,0.9)";

      if (id === "round") {
        const lines = Array.from({length: 8}, function(_, i) {
          const a = i * 45 * Math.PI / 180;
          return { x1: 24 + 19*Math.cos(a), y1: 24 + 19*Math.sin(a), x2: 24 + 9*Math.cos(a), y2: 24 + 9*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="19" fill={f} stroke={c} strokeWidth="1.5"/>
            {lines.map(function(l, i) { return <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={ln} strokeWidth="0.8"/>; })}
            <circle cx="24" cy="24" r="9" fill={fi} stroke={c} strokeWidth="1"/>
            <circle cx="17" cy="17" r="2.5" fill={sp}/>
            <circle cx="21" cy="14" r="1.5" fill={sp} opacity="0.7"/>
          </svg>
        );
      }
      if (id === "oval") {
        const lines = Array.from({length: 8}, function(_, i) {
          const a = i * 45 * Math.PI / 180;
          const ox = 13 * Math.cos(a), oy = 19 * Math.sin(a);
          const len = Math.sqrt(ox*ox + oy*oy), sc = 7 / len;
          return { x1: 24+ox, y1: 24+oy, x2: 24+ox*sc, y2: 24+oy*sc };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            <ellipse cx="24" cy="24" rx="13" ry="19" fill={f} stroke={c} strokeWidth="1.5"/>
            {lines.map(function(l, i) { return <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={ln} strokeWidth="0.8"/>; })}
            <ellipse cx="24" cy="24" rx="6" ry="9" fill={fi} stroke={c} strokeWidth="1"/>
            <ellipse cx="19" cy="18" rx="2" ry="2.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "cushion") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <rect x="5" y="5" width="38" height="38" rx="9" fill={f} stroke={c} strokeWidth="1.5"/>
          <line x1="5" y1="5" x2="17" y2="17" stroke={ln} strokeWidth="0.8"/>
          <line x1="43" y1="5" x2="31" y2="17" stroke={ln} strokeWidth="0.8"/>
          <line x1="5" y1="43" x2="17" y2="31" stroke={ln} strokeWidth="0.8"/>
          <line x1="43" y1="43" x2="31" y2="31" stroke={ln} strokeWidth="0.8"/>

          <circle cx="16" cy="14" r="2.5" fill={sp}/>
        </svg>

      if (id === "princess") return (
        <svg width={size} height={size} viewBox="0 0 48 48">

          <line x1="5" y1="5" x2="43" y2="43" stroke={ln} strokeWidth="0.8"/>
          <line x1="43" y1="5" x2="5" y2="43" stroke={ln} strokeWidth="0.8"/>
          <rect x="16" y="16" width="16" height="16" fill={fi} stroke={c} strokeWidth="1"/>

          <polygon points="5,43 16,32 5,32" fill={ln} opacity="0.35"/>

      if (id === "pear") return (
        <svg width={size} height={size} viewBox="0 0 48 48">

          <polygon points="14,4 34,4 44,14 44,34 34,44 14,44 4,34 4,14" fill={f} stroke={c} strokeWidth="1.5"/>

          <polygon points="20,16 28,16 32,20 32,28 28,32 20,32 16,28 16,20" fill={f} stroke={ln} strokeWidth="0.8"/>
          <circle cx="16" cy="12" r="2.5" fill={sp}/>
        </svg>
      );
      if (id === "marquise") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <path d="M24 3 C34 12 41 18 41 24 C41 30 34 36 24 45 C14 36 7 30 7 24 C7 18 14 12 24 3Z" fill={f} stroke={c} strokeWidth="1.5"/>
          <line x1="24" y1="3" x2="24" y2="45" stroke={ln} strokeWidth="0.8"/>
          <line x1="7" y1="24" x2="41" y2="24" stroke={ln} strokeWidth="0.8"/>
          <path d="M24 12 C30 17 33 21 33 24 C33 27 30 31 24 36 C18 31 15 27 15 24 C15 21 18 17 24 12Z" fill={fi} stroke={c} strokeWidth="0.8"/>
          <circle cx="18" cy="14" r="2.5" fill={sp}/>
        </svg>
      );
      return null;
    }

    function SettingIcon({ id, sel, size = 44 }) {
      const c  = sel ? "#1a56db" : "#6b7280";
      const sf = sel ? "#dbeafe" : "#f0f4ff";
      const mf = sel ? "#bfdbfe" : "#e5e7eb";
      const mc = sel ? "#93c5fd" : "#d1d5db";
      const sp = "rgba(255,255,255,0.9)";

      if (id === "4prongs") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <circle cx="14" cy="15" r="4" fill={mf} stroke={c} strokeWidth="1.5"/>
          <circle cx="34" cy="15" r="4" fill={mf} stroke={c} strokeWidth="1.5"/>
          <circle cx="14" cy="33" r="4" fill={mf} stroke={c} strokeWidth="1.5"/>

          <line x1="14" y1="33" x2="18" y2="28" stroke={c} strokeWidth="1.2"/>
          <line x1="34" y1="33" x2="30" y2="28" stroke={c} strokeWidth="1.2"/>
          <ellipse cx="24" cy="24" rx="13" ry="10" fill={sf} stroke={c} strokeWidth="1.5"/>
          <ellipse cx="20" cy="21" rx="2.5" ry="2" fill={sp}/>
        </svg>
      );
      if (id === "basket") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="18" fill="none" stroke={mc} strokeWidth="3"/>
          <line x1="24" y1="6" x2="24" y2="42" stroke={mc} strokeWidth="1.5"/>
          <line x1="6" y1="24" x2="42" y2="24" stroke={mc} strokeWidth="1.5"/>
          <line x1="11" y1="11" x2="37" y2="37" stroke={mc} strokeWidth="1"/>
          <line x1="37" y1="11" x2="11" y2="37" stroke={mc} strokeWidth="1"/>
          <ellipse cx="24" cy="24" rx="11" ry="9" fill={sf} stroke={c} strokeWidth="1.5"/>
          <ellipse cx="20" cy="21" rx="2.5" ry="2" fill={sp}/>
        </svg>
      );
      if (id === "peghead") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <rect x="21" y="31" width="6" height="11" rx="3" fill={mf} stroke={c} strokeWidth="1.5"/>
          <rect x="19" y="26" width="10" height="6" rx="2" fill={mf} stroke={c} strokeWidth="1"/>
          <ellipse cx="24" cy="21" rx="15" ry="11" fill={sf} stroke={c} strokeWidth="1.5"/>
          <ellipse cx="19" cy="18" rx="2.5" ry="2" fill={sp}/>
        </svg>
      );
      if (id === "pave") {
        const dots = Array.from({length: 12}, function(_, i) {
          const a = i * 30 * Math.PI / 180;
          return { cx: 24 + 15*Math.cos(a), cy: 24 + 15*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {dots.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="3" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="9" ry="7" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "singlehalo") {
        const n = 14;
        const dots = Array.from({length: n}, function(_, i) {
          const a = i * (360/n) * Math.PI / 180;
          return { cx: 24 + 18*Math.cos(a), cy: 24 + 18*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {dots.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2.5" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="10" ry="8" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "doublehalo") {
        const outer = Array.from({length: 18}, function(_, i) {
          const a = i * 20 * Math.PI / 180;
          return { cx: 24 + 21*Math.cos(a), cy: 24 + 21*Math.sin(a) };
        });
        const inner = Array.from({length: 12}, function(_, i) {
          const a = i * 30 * Math.PI / 180;
          return { cx: 24 + 15*Math.cos(a), cy: 24 + 15*Math.sin(a) };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {outer.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2" fill={mc} stroke={c} strokeWidth="0.8"/>; })}
            {inner.map(function(d, i) { return <circle key={i} cx={d.cx} cy={d.cy} r="2.5" fill={mf} stroke={c} strokeWidth="1"/>; })}
            <ellipse cx="24" cy="24" rx="8" ry="6" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="1.8" ry="1.4" fill={sp}/>
          </svg>
        );
      }
      if (id === "crown") {
        const prongs = Array.from({length: 6}, function(_, i) {
          const a = i * 60 * Math.PI / 180;
          return { cx: 24 + 17*Math.cos(a), cy: 24 + 17*Math.sin(a), rot: i*60 };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {prongs.map(function(p, i) {
              return <ellipse key={i} cx={p.cx} cy={p.cy} rx="3.5" ry="5" transform={"rotate(" + p.rot + "," + p.cx + "," + p.cy + ")"} fill={mf} stroke={c} strokeWidth="1.2"/>;
            })}
            <ellipse cx="24" cy="24" rx="10" ry="8" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      if (id === "flowerhalo") {
        const petals = Array.from({length: 8}, function(_, i) {
          const a = i * 45 * Math.PI / 180;
          return { cx: 24 + 16*Math.cos(a), cy: 24 + 16*Math.sin(a), rot: i*45 };
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48">
            {petals.map(function(p, i) {
              return <ellipse key={i} cx={p.cx} cy={p.cy} rx="5.5" ry="3" transform={"rotate(" + p.rot + "," + p.cx + "," + p.cy + ")"} fill={mf} stroke={c} strokeWidth="1"/>;
            })}
            <ellipse cx="24" cy="24" rx="9" ry="7" fill={sf} stroke={c} strokeWidth="1.5"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.5" fill={sp}/>
          </svg>
        );
      }
      return null;
    }

          <path d="M4 35 C12 35 16 13 24 13 C32 13 36 35 44 35" fill="none" stroke={mf} strokeWidth="7" strokeLinecap="round"/>
          <path d="M4 13 C12 13 16 35 24 35 C32 35 36 13 44 13" fill="none" stroke="white" strokeWidth="2" strokeOpacity="0.5" strokeLinecap="round"/>
        </svg>
      );
      if (id === "knifeedge") return (
        <svg width={size} height={size} viewBox="0 0 48 48">
          <path d="M4 28 L24 14 L44 28 L24 38 Z" fill={mf} stroke={c} strokeWidth="1.5"/>
          <line x1="4" y1="28" x2="44" y2="28" stroke="white" strokeWidth="2" strokeOpacity="0.6" strokeLinecap="round"/>
          <line x1="4" y1="28" x2="24" y2="14" stroke="white" strokeWidth="1" strokeOpacity="0.8" strokeLinecap="round"/>

    /* ── Three.js ring geometry builder ──────────────────────── */

    function buildRingGroup(T, config) {
      var group = new T.Group();
      var R = 1.2;

      var mp = {
        yellow: { color: 0xC08010, roughness: 0.14, metalness: 1.0 },
        white:  { color: 0xB4B4B4, roughness: 0.12, metalness: 1.0 },
        rose:   { color: 0xC06858, roughness: 0.18, metalness: 1.0 },
      };
      var hmP = mp[config.metalColor] || mp.yellow;
      var bmP = mp[config.mountingColor || config.metalColor] || hmP;
      var headMat = new T.MeshStandardMaterial(Object.assign({}, hmP));
      var bandMat = new T.MeshStandardMaterial(Object.assign({}, bmP));

      var stoneHex = config.stoneType === "lab" ? 0xC0D8FF : 0xF8F4F0;
      var stoneMat = new T.MeshPhysicalMaterial({
        color: stoneHex, roughness: 0.02, metalness: 0,
        transmission: 0.92, ior: 2.42, thickness: 0.4,
        transparent: true, opacity: 1,
      });
      var sideHex =
        config.sideStoneType === "blackdiamond" ? 0x222233 :
        config.sideStoneType === "altsapphire"  ? 0x1838C0 :
        config.sideStoneType === "altemerald"   ? 0x186040 :
        config.sideStoneType === "altruby"      ? 0xB81828 : stoneHex;
      var sideMat = stoneMat.clone();
      sideMat.color.setHex(sideHex);

      /* band */
      function addTorus(ox, tubeR, radSeg) {
        var geo = new T.TorusGeometry(R, tubeR, radSeg || 16, 180);
        var m = new T.Mesh(geo, bandMat);
        m.castShadow = true;
        if (ox) m.position.x = ox;
        group.add(m);
      }
      var mt = config.mounting;
      if      (mt === "double")     { addTorus(-0.12, 0.055, 14); addTorus(0.12, 0.055, 14); }
      else if (mt === "knifeedge")  { addTorus(0, 0.065, 4); }
      else if (mt === "split")      { addTorus(-0.18, 0.052, 14); addTorus(0.18, 0.052, 14); }
      else if (mt === "tapered")    { addTorus(0, 0.10, 16); }
      else if (mt === "squareedge") { addTorus(0, 0.09, 4); }
      else                          { addTorus(0, 0.082, 14); }

      /* stone */
      function mkStoneGeo(sx, sy, sz, det) {
        var g = new T.OctahedronGeometry(0.30, det !== undefined ? det : 1);
        g.scale(sx || 1, sy || 0.85, sz || 1);
        return g;
      }
      var ss = config.stoneShape;
      var sGeo =
        ss === "oval"     ? mkStoneGeo(0.78, 0.88, 1.18, 1) :
        ss === "cushion"  ? mkStoneGeo(1.10, 0.78, 1.10, 2) :
        ss === "princess" ? mkStoneGeo(1.15, 0.80, 1.15, 0) :
        ss === "emerald"  ? mkStoneGeo(0.90, 0.80, 1.42, 1) :
        ss === "marquise" ? mkStoneGeo(0.60, 0.82, 1.55, 0) :
        ss === "pear"     ? mkStoneGeo(0.80, 0.82, 1.30, 0) :
                            mkStoneGeo(1.05, 0.85, 1.05, 1);
      var stoneMesh = new T.Mesh(sGeo, stoneMat);
      stoneMesh.position.y = R + 0.14;
      stoneMesh.castShadow = true;
      group.add(stoneMesh);

      /* setting plate */
      var plate = new T.Mesh(new T.CylinderGeometry(0.34, 0.29, 0.09, 16), headMat);
      plate.position.y = R - 0.02;
      plate.castShadow = true;
      group.add(plate);

      /* prongs / halos */
      var headGroup = new T.Group();
      headGroup.position.y = R;
      var sett = config.ringHead;

      function addProng(a, pr) {
        var geo = new T.CylinderGeometry(0.034, 0.052, 0.40, 8);
        var m = new T.Mesh(geo, headMat);
        m.position.set(pr * Math.cos(a), 0.16, pr * Math.sin(a));
        m.rotation.x =  Math.sin(a) * 0.32;
        m.rotation.z = -Math.cos(a) * 0.32;
        m.castShadow = true;
        headGroup.add(m);
      }
      function addHaloRing(n, hr, gr, dy) {
        for (var i = 0; i < n; i++) {
          var a = i * (Math.PI * 2 / n);
          var gem = new T.Mesh(new T.OctahedronGeometry(gr, 0), stoneMat);
          gem.position.set(hr * Math.cos(a), dy || 0.02, hr * Math.sin(a));
          gem.castShadow = true;
          headGroup.add(gem);
        }
      }

      if (sett === "4prongs" || sett === "basket" || sett === "peghead") {
        [45, 135, 225, 315].forEach(function(d) { addProng(d * Math.PI / 180, 0.27); });
        if (sett === "basket") {
          var bGeo = new T.TorusGeometry(0.34, 0.020, 8, 32);
          bGeo.rotateX(Math.PI / 2);
          headGroup.add(new T.Mesh(bGeo, headMat));
        }
        if (sett === "peghead") {
          var peg = new T.Mesh(new T.CylinderGeometry(0.045, 0.068, 0.28, 8), headMat);
          peg.position.y = -0.48;
          headGroup.add(peg);
        }
      } else if (sett === "singlehalo" || sett === "doublehalo") {
        addProng(0, 0.27); addProng(Math.PI, 0.27);
        addHaloRing(20, 0.44, 0.058, 0.02);
        if (sett === "doublehalo") addHaloRing(28, 0.58, 0.046, -0.04);
      } else if (sett === "flowerhalo") {
        addProng(0, 0.27); addProng(Math.PI, 0.27);
        for (var fi = 0; fi < 8; fi++) {
          var fa = fi * Math.PI / 4;
          var fpg = new T.OctahedronGeometry(0.07, 0);
          fpg.scale(1.18, 0.55, 0.88);
          var fgem = new T.Mesh(fpg, stoneMat);
          fgem.position.set(0.44 * Math.cos(fa), 0.02, 0.44 * Math.sin(fa));
          fgem.rotation.y = -fa;
          fgem.castShadow = true;
          headGroup.add(fgem);
        }
      } else if (sett === "crown") {
        for (var ci = 0; ci < 6; ci++) {
          var ca = ci * Math.PI / 3;
          var cg = new T.CylinderGeometry(0.025, 0.050, 0.48, 6);
          var cm = new T.Mesh(cg, headMat);
          cm.position.set(0.27 * Math.cos(ca), 0.16, 0.27 * Math.sin(ca));
          cm.rotation.x =  Math.sin(ca) * 0.30;
          cm.rotation.z = -Math.cos(ca) * 0.30;
          cm.castShadow = true;
          headGroup.add(cm);
        }
      } else if (sett === "pave") {
        addHaloRing(16, 0.40, 0.053, 0.02);
      } else {
        [45, 135, 225, 315].forEach(function(d) { addProng(d * Math.PI / 180, 0.27); });
      }
      group.add(headGroup);

      /* side stones along shoulders */
      if (config.sideSetting !== "none") {
        var sideGeo = new T.OctahedronGeometry(0.053, 0);
        for (var ss2 = -1; ss2 <= 1; ss2 += 2) {
          for (var j = 1; j <= 4; j++) {
            var sang = Math.PI / 2 + ss2 * j * 0.20;
            var srx = Math.cos(sang), sry = Math.sin(sang);
            var sgem = new T.Mesh(sideGeo.clone(), sideMat);
            sgem.position.set(srx * R * 1.09, sry * R * 1.09, 0);
            sgem.rotation.z = sang + Math.PI / 2;
            sgem.castShadow = true;
            group.add(sgem);
          }
        }
      }

      return group;
    }

    /* ── React wrapper for Three.js canvas ─────────────────── */

    function RingPreview({ config }) {
      var mountRef = useRef(null);
      var stateRef = useRef({});

      /* scene setup — once on mount */
      useEffect(function() {
        var T = window.THREE;
        if (!T || !mountRef.current) return;

        var W = 290, H = 300;
        var renderer = new T.WebGLRenderer({ antialias: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = T.PCFSoftShadowMap;
        renderer.toneMapping = T.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.35;
        if ("outputEncoding" in renderer) renderer.outputEncoding = 3001; /* sRGBEncoding */
        mountRef.current.appendChild(renderer.domElement);

        var scene = new T.Scene();
        scene.background = new T.Color(0xF4F1EE);

        try {
          var pmrem = new T.PMREMGenerator(renderer);
          var envTex = pmrem.fromScene(new T.RoomEnvironment(), 0.04).texture;
          scene.environment = envTex;
          pmrem.dispose();
        } catch(e) {}

        var camera = new T.PerspectiveCamera(35, W / H, 0.01, 100);
        camera.position.set(2.2, 3.0, 5.5);
        camera.lookAt(0, 1.3, 0);

        scene.add(new T.AmbientLight(0xfff8f0, 0.55));
        var kl = new T.DirectionalLight(0xffffff, 2.8);
        kl.position.set(4, 9, 4); kl.castShadow = true;
        kl.shadow.mapSize.set(1024, 1024);
        scene.add(kl);
        var fl = new T.DirectionalLight(0xffd5a0, 0.9);
        fl.position.set(-5, 3, -3); scene.add(fl);
        var bl = new T.DirectionalLight(0xffffff, 1.8);
        bl.position.set(0, 4, -7); scene.add(bl);
        var sp = new T.PointLight(0xffffff, 4, 18);
        sp.position.set(0.5, 5, 2.5); scene.add(sp);

        var floor = new T.Mesh(
          new T.PlaneGeometry(20, 20),
          new T.ShadowMaterial({ opacity: 0.18 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.6;
        floor.receiveShadow = true;
        scene.add(floor);

        var dragging = false, prevX = 0, prevY = 0;
        var canvas = renderer.domElement;
        var onPD = function(e) { dragging = true; prevX = e.clientX; prevY = e.clientY; stateRef.current.autoSpin = false; };
        var onPU = function()  { dragging = false; };
        var onPM = function(e) {
          if (!dragging || !stateRef.current.ring) return;
          stateRef.current.ring.rotation.y += (e.clientX - prevX) * 0.013;
          stateRef.current.ring.rotation.x = Math.max(-0.7, Math.min(0.7,
            stateRef.current.ring.rotation.x + (e.clientY - prevY) * 0.013));
          prevX = e.clientX; prevY = e.clientY;
        };
        canvas.addEventListener("pointerdown", onPD);
        window.addEventListener("pointerup", onPU);
        window.addEventListener("pointermove", onPM);

        var raf;
        function animate() {
          raf = requestAnimationFrame(animate);
          if (stateRef.current.autoSpin && stateRef.current.ring) {
            stateRef.current.ring.rotation.y += 0.007;
          }
          renderer.render(scene, camera);
        }
        animate();

        stateRef.current = { scene: scene, camera: camera, renderer: renderer, ring: null, autoSpin: true };

        return function() {
          cancelAnimationFrame(raf);
          canvas.removeEventListener("pointerdown", onPD);
          window.removeEventListener("pointerup", onPU);
          window.removeEventListener("pointermove", onPM);
          renderer.dispose();
          if (mountRef.current && canvas.parentNode === mountRef.current) {
            mountRef.current.removeChild(canvas);
          }
        };
      }, []);

      /* rebuild ring geometry whenever config changes */
      useEffect(function() {
        var T = window.THREE;
        var sc = stateRef.current;
        if (!T || !sc.scene) return;
        if (sc.ring) {
          sc.scene.remove(sc.ring);
          sc.ring.traverse(function(child) {
            if (child.geometry) child.geometry.dispose();
            if (child.material) {
              if (Array.isArray(child.material)) child.material.forEach(function(m) { m.dispose(); });
              else child.material.dispose();
            }
          });
        }
        var ring = buildRingGroup(T, config);
        ring.rotation.x = 0.12;
        sc.scene.add(ring);
        sc.ring = ring;
      }, [config]);

      return (
        <div ref={mountRef} style={{ width: 290, height: 300, borderRadius: 10, overflow: "hidden", cursor: "grab" }}/>
      );
    }
